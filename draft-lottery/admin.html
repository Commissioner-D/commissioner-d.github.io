<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Draft Lottery — Admin</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#0f1115; color:#e8e8e8; padding:2rem 1rem 4rem; }
  .container { max-width:640px; margin:0 auto; }
  h1 { font-size:20px; margin:0 0 1.5rem; }
  label { display:block; font-size:12px; color:#8a8f98; text-transform:uppercase; letter-spacing:0.5px; margin:1rem 0 6px; }
  input, textarea { width:100%; background:#1a1d24; border:1px solid #2a2d34; border-radius:8px; color:#e8e8e8; padding:10px 12px; font-size:14px; font-family:inherit; }
  textarea { min-height:120px; resize:vertical; }
  button { background:#d85a30; color:white; border:none; padding:10px 20px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; margin-top:1rem; }
  button:hover:not(:disabled) { background:#c14e26; }
  button:disabled { background:#3a3d44; cursor:not-allowed; }
  button.secondary { background:#2a2d34; }
  button.secondary:hover:not(:disabled) { background:#383c45; }
  .row { display:flex; gap:10px; }
  .row > div { flex:1; }
  .hidden { display:none; }
  .card { background:#1a1d24; border:1px solid #2a2d34; border-radius:10px; padding:1.25rem; margin-top:1.5rem; }
  .draw-link { font-size:13px; color:#5dcaa5; word-break:break-all; }
  table { width:100%; border-collapse:collapse; font-size:13px; margin-top:1rem; }
  th,td { padding:8px 10px; border-bottom:1px solid #23262d; text-align:left; }
  th { color:#8a8f98; font-weight:500; font-size:11px; text-transform:uppercase; }
  .status-msg { font-size:13px; color:#8a8f98; margin-top:0.5rem; }
  .draw-list-item { padding:8px 0; border-bottom:1px solid #23262d; display:flex; justify-content:space-between; align-items:center; font-size:14px; }
  .draw-list-item a { color:#85b7eb; text-decoration:none; cursor:pointer; }
</style>
</head>
<body>
<div class="container">
  <h1>Draft Lottery — Admin</h1>

  <div id="loginBox" class="card">
    <label>Email</label>
    <input type="email" id="email">
    <label>Passwort</label>
    <input type="password" id="password">
    <button id="loginBtn">Login</button>
    <div class="status-msg" id="loginStatus"></div>
  </div>

  <div id="dashboard" class="hidden">
    <div class="card">
      <h2 style="font-size:15px;margin:0 0 0.5rem;">Neue Ziehung anlegen</h2>
      <label>Name</label>
      <input type="text" id="drawName" placeholder="z.B. MLF Draft Order Lottery">
      <div class="row">
        <div>
          <label>Pool A (ein Team pro Zeile)</label>
          <textarea id="poolA" placeholder="Team 1&#10;Team 2&#10;..."></textarea>
        </div>
        <div>
          <label>Pool B (ein Team pro Zeile)</label>
          <textarea id="poolB" placeholder="Team A&#10;Team B&#10;..."></textarea>
        </div>
      </div>
      <div class="row">
        <div>
          <label>Start (österreichische Zeit)</label>
          <input type="datetime-local" id="scheduledAt">
        </div>
        <div>
          <label>Intervall pro Ziehung (Sekunden)</label>
          <input type="number" id="pickInterval" value="10" min="1">
        </div>
      </div>
      <button id="createBtn">Ziehung erstellen</button>
      <div class="status-msg" id="createStatus"></div>
    </div>

    <div class="card">
      <h2 style="font-size:15px;margin:0 0 0.5rem;">Bestehende Ziehungen</h2>
      <div id="drawList"></div>
    </div>

    <div id="activeDraw" class="card hidden">
      <h2 style="font-size:15px;margin:0 0 0.5rem;" id="activeDrawName"></h2>
      <div class="draw-link" id="watchLink"></div>
      <div class="row" style="margin-top:1rem;">
        <button id="drawNextBtn">Nächste Ziehung</button>
        <button id="resetBtn" class="secondary">Reset</button>
      </div>
      <table>
        <thead><tr><th>Pool A</th><th>Pool B</th></tr></thead>
        <tbody id="resultsBody"></tbody>
      </table>
      <div id="leftoverInfo" class="status-msg"></div>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://taqpqknorxxekuqhrcxm.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_iHtHaaxxy_JCJkFpuwgUFQ_ppZH6Xca';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function clean(s) {
    return typeof s === 'string' ? s.replace(/^"+|"+$/g, '') : s;
  }

  const loginBox = document.getElementById('loginBox');
  const dashboard = document.getElementById('dashboard');
  const loginStatus = document.getElementById('loginStatus');

  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    loginStatus.textContent = 'Logging in...';
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      loginStatus.textContent = 'Fehler: ' + error.message;
      return;
    }
    loginStatus.textContent = '';
    loginBox.classList.add('hidden');
    dashboard.classList.remove('hidden');
    loadDraws();
  });

  // restore session on reload
  supabase.auth.getSession().then(({ data }) => {
    if (data.session) {
      loginBox.classList.add('hidden');
      dashboard.classList.remove('hidden');
      loadDraws();
    }
  });

  // Interpretiert einen datetime-local Wert als Europe/Vienna Zeit und gibt UTC ISO zurück
  function viennaLocalToUTCISO(localValue) {
    if (!localValue) return null;
    const asUTCGuess = new Date(localValue + ':00Z');
    const dtf = new Intl.DateTimeFormat('en-US', {
      timeZone: 'Europe/Vienna', hour12: false,
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
    const parts = dtf.formatToParts(asUTCGuess).reduce((acc, p) => {
      if (p.type !== 'literal') acc[p.type] = p.value;
      return acc;
    }, {});
    const viennaAsIfUTC = Date.UTC(
      parts.year, parts.month - 1, parts.day, parts.hour === '24' ? 0 : parts.hour, parts.minute, parts.second
    );
    const diff = asUTCGuess.getTime() - viennaAsIfUTC;
    return new Date(asUTCGuess.getTime() + diff).toISOString();
  }

  function utcToViennaDisplay(utcISO) {
    if (!utcISO) return null;
    return new Date(utcISO).toLocaleString('de-AT', { timeZone: 'Europe/Vienna', dateStyle: 'medium', timeStyle: 'short' });
  }

  document.getElementById('createBtn').addEventListener('click', async () => {
    const name = document.getElementById('drawName').value.trim();
    const poolA = document.getElementById('poolA').value.split('\n').map(s => s.trim()).filter(Boolean);
    const poolB = document.getElementById('poolB').value.split('\n').map(s => s.trim()).filter(Boolean);
    const createStatus = document.getElementById('createStatus');

    if (!name || poolA.length === 0 || poolB.length === 0) {
      createStatus.textContent = 'Name, Pool A und Pool B ausfüllen.';
      return;
    }
    if (poolA.length > poolB.length) {
      createStatus.textContent = 'Pool A darf nicht größer sein als Pool B.';
      return;
    }

    const config = { type: 'pool_match', pool_a: poolA, pool_b: poolB };
    const state = { results: [], remaining_b: [...poolB], next_index: 0 };
    const scheduledLocal = document.getElementById('scheduledAt').value;
    const scheduledAt = viennaLocalToUTCISO(scheduledLocal);
    const pickInterval = parseInt(document.getElementById('pickInterval').value, 10) || 10;

    const insertPayload = { name, config, state, status: 'pending', pick_interval_seconds: pickInterval };
    if (scheduledAt) insertPayload.scheduled_at = scheduledAt;

    const { data, error } = await supabase.from('draws').insert(insertPayload).select().single();

    if (error) {
      createStatus.textContent = 'Fehler: ' + error.message;
      return;
    }
    createStatus.textContent = scheduledAt
      ? `Erstellt. Start: ${utcToViennaDisplay(scheduledAt)} (Wien)`
      : 'Erstellt.';
    document.getElementById('drawName').value = '';
    document.getElementById('poolA').value = '';
    document.getElementById('poolB').value = '';
    document.getElementById('scheduledAt').value = '';
    loadDraws();
    openDraw(data.id);
  });

  async function loadDraws() {
    const { data, error } = await supabase.from('draws').select('*').order('created_at', { ascending: false });
    const listEl = document.getElementById('drawList');
    if (error) { listEl.textContent = 'Fehler: ' + error.message; return; }
    if (!data.length) { listEl.textContent = 'Noch keine Ziehungen.'; return; }
    listEl.innerHTML = data.map(d =>
      `<div class="draw-list-item">
        <a data-id="${d.id}">${d.name}</a>
        <span style="display:flex;align-items:center;gap:10px;">
          <span style="color:#8a8f98;">${d.status}</span>
          <button class="secondary delete-btn" data-id="${d.id}" style="margin:0;padding:4px 10px;font-size:12px;">Löschen</button>
        </span>
      </div>`
    ).join('');
    listEl.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => openDraw(a.dataset.id));
    });
    listEl.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!confirm('Diese Ziehung wirklich unwiderruflich löschen?')) return;
        const { error } = await supabase.from('draws').delete().eq('id', btn.dataset.id);
        if (error) { alert('Fehler: ' + error.message); return; }
        if (currentDraw && currentDraw.id === btn.dataset.id) {
          currentDraw = null;
          document.getElementById('activeDraw').classList.add('hidden');
        }
        loadDraws();
      });
    });
  }

  let currentDraw = null;

  async function openDraw(id) {
    const { data, error } = await supabase.from('draws').select('*').eq('id', id).single();
    if (error) { alert(error.message); return; }
    currentDraw = data;
    renderActiveDraw();
    document.getElementById('activeDraw').classList.remove('hidden');
    document.getElementById('activeDraw').scrollIntoView({ behavior: 'smooth' });
  }

  function renderActiveDraw() {
    document.getElementById('activeDrawName').textContent = currentDraw.name;
    const watchUrl = `${location.origin}${location.pathname.replace('admin.html','watch.html')}?draw=${currentDraw.id}`;
    const watchLinkEl = document.getElementById('watchLink');
    watchLinkEl.innerHTML = `<a href="${watchUrl}" target="_blank" style="color:#5dcaa5;">${watchUrl}</a>`
      + `<div style="color:#8a8f98;margin-top:4px;">`
      + (currentDraw.scheduled_at ? `Start: ${utcToViennaDisplay(currentDraw.scheduled_at)} (Wien) · ` : '')
      + `Intervall: ${currentDraw.pick_interval_seconds || 10}s</div>`;

    const tbody = document.getElementById('resultsBody');
    tbody.innerHTML = currentDraw.state.results.map(r =>
      `<tr><td>${clean(r.a)}</td><td>${clean(r.b)}</td></tr>`
    ).join('');

    const done = currentDraw.state.next_index >= currentDraw.config.pool_a.length;
    const drawNextBtn = document.getElementById('drawNextBtn');
    drawNextBtn.disabled = done;
    drawNextBtn.textContent = done ? 'Fertig' : 'Nächste Ziehung';

    const leftoverInfo = document.getElementById('leftoverInfo');
    leftoverInfo.textContent = done
      ? 'Übrig: ' + currentDraw.state.remaining_b.map(clean).join(', ')
      : '';
  }

  document.getElementById('drawNextBtn').addEventListener('click', async () => {
    if (!currentDraw) return;
    const state = currentDraw.state;
    const config = currentDraw.config;
    if (state.next_index >= config.pool_a.length) return;

    const teamA = config.pool_a[state.next_index];
    const idx = Math.floor(Math.random() * state.remaining_b.length);
    const teamB = state.remaining_b[idx];
    const newRemaining = [...state.remaining_b];
    newRemaining.splice(idx, 1);

    const newState = {
      results: [...state.results, { a: teamA, b: teamB }],
      remaining_b: newRemaining,
      next_index: state.next_index + 1
    };
    const newStatus = newState.next_index >= config.pool_a.length ? 'done' : 'live';

    const { data, error } = await supabase.from('draws')
      .update({ state: newState, status: newStatus })
      .eq('id', currentDraw.id)
      .select().single();

    if (error) { alert(error.message); return; }
    currentDraw = data;
    renderActiveDraw();
  });

  document.getElementById('resetBtn').addEventListener('click', async () => {
    if (!currentDraw) return;
    if (!confirm('Ziehung wirklich zurücksetzen?')) return;
    const config = currentDraw.config;
    const newState = { results: [], remaining_b: [...config.pool_b], next_index: 0 };
    const { data, error } = await supabase.from('draws')
      .update({ state: newState, status: 'pending' })
      .eq('id', currentDraw.id)
      .select().single();
    if (error) { alert(error.message); return; }
    currentDraw = data;
    renderActiveDraw();
  });
</script>
</body>
</html>
